<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Dixon Hall — No Limit Country</title>
  <meta name="description" content="Dixon Hall is John Dixon Hall Jr. and rock icon Terry Glaze — modern country music with soul, storytelling, and southern rock energy. New single &quot;Beautiful Life&quot; out 7.31.26.">
  <meta name="theme-color" content="#0a0705">

  <!-- Open Graph / social preview -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Dixon Hall — No Limit Country">
  <meta property="og:description" content="Modern country music with soul, storytelling, and southern rock energy. New single &quot;Beautiful Life&quot; out 7.31.26.">
  <meta property="og:image" content="assets/hero-mock.png">
  <meta property="og:url" content="https://www.dixonhallmusic.com/">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="icon" type="image/png" href="assets/logo.png">
  <link rel="apple-touch-icon" href="assets/logo.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Marcellus+SC&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;background:#0a0705;color:#e7ddcb;font-family:'Marcellus',serif;}
    a{-webkit-tap-highlight-color:transparent;}

    @keyframes dhZoom{0%{transform:scale(1.05);}100%{transform:scale(1.11);}}
    @keyframes dhWave{0%,100%{transform:scaleY(.35);}50%{transform:scaleY(1);}}

    /* ---------- HERO SHELL ---------- */
    .hero{
      position:relative;width:100%;
      aspect-ratio:1536/1024;max-height:100vh;min-height:560px;
      overflow:hidden;background:#0a0705;
    }
    .hero-art{
      position:absolute;inset:0;width:100%;height:100%;
      object-fit:cover;object-position:center center;
      animation:dhZoom 30s ease-out forwards;
    }
    .mask-social{
      position:absolute;top:0;right:0;width:52%;height:15%;z-index:2;pointer-events:none;
      background:radial-gradient(120% 150% at 88% 0%, rgba(8,6,4,.92) 0%, rgba(8,6,4,.55) 42%, rgba(8,6,4,0) 72%);
    }
    .mask-nav{
      position:absolute;left:0;right:0;bottom:0;height:32%;z-index:2;pointer-events:none;
      background:linear-gradient(180deg, rgba(8,6,4,0) 0%, rgba(8,6,4,.28) 24%, rgba(7,5,3,.82) 52%, rgba(6,4,2,.98) 78%, #060402 100%);
    }

    /* ---------- FOLLOW US + SOCIALS ---------- */
    .social-row{
      position:absolute;top:clamp(18px,3.4%,42px);right:clamp(22px,3.6%,58px);z-index:5;
      display:flex;align-items:center;gap:clamp(14px,1.4vw,22px);
    }
    .follow-label{
      font-family:'Marcellus SC',serif;font-size:clamp(12px,1vw,15px);
      letter-spacing:.28em;color:#e7ddcb;text-transform:uppercase;
    }
    .social-icons{display:flex;align-items:center;gap:clamp(12px,1.15vw,18px);font-size:clamp(15px,1.15vw,18px);}
    .social-icons a{color:#dcd2c0;text-decoration:none;transition:color .2s, transform .2s;}
    .social-icons a:hover{color:#d3a860;transform:translateY(-2px);}

    /* ---------- BOTTOM NAV ---------- */
    .nav-bar{
      position:absolute;left:0;right:0;bottom:0;z-index:5;
      display:flex;align-items:center;justify-content:center;gap:clamp(22px,3vw,54px);
      width:min(1440px,94%);margin:0 auto;
      padding:0 clamp(16px,2vw,40px) clamp(22px,3.4%,42px);
    }
    .nav-group{display:flex;align-items:center;gap:clamp(22px,2.8vw,52px);flex:1;}
    .nav-group.nav-left{justify-content:flex-end;}
    .nav-group.nav-right{justify-content:flex-start;}
    .nav-link{
      position:relative;font-family:'Marcellus',serif;font-size:clamp(14px,1.05vw,18px);
      letter-spacing:.2em;text-transform:uppercase;color:#d8cdba;text-decoration:none;
      padding-bottom:6px;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;
    }
    .nav-link:hover{color:#fff;border-bottom-color:#cda45f;}
    .nav-link.active{color:#f3ead9;border-bottom-color:#cda45f;}

    .listen-btn{
      display:inline-flex;align-items:center;gap:14px;flex:0 0 auto;
      font-family:'Marcellus',serif;font-size:clamp(14px,1.05vw,18px);
      letter-spacing:.22em;text-transform:uppercase;color:#e9c17e;text-decoration:none;
      border:1px solid rgba(205,164,95,.75);padding:clamp(11px,1.1vw,15px) clamp(22px,2vw,34px);
      background:linear-gradient(180deg, rgba(205,164,95,.1), rgba(205,164,95,.02));
      box-shadow:0 6px 26px rgba(0,0,0,.5), inset 0 0 22px rgba(205,164,95,.08);
      transition:all .22s ease;
    }
    .listen-btn:hover{
      color:#0f0a04;border-color:#e9c17e;background:#dcac60;
      box-shadow:0 10px 30px rgba(205,164,95,.4);
    }
    .eq{display:inline-flex;align-items:flex-end;gap:2.5px;height:15px;}
    .eq span{display:block;width:2.5px;height:100%;background:currentColor;transform-origin:bottom;animation:dhWave 1s ease-in-out infinite;}
    .eq span:nth-child(1){animation-delay:0s;}
    .eq span:nth-child(2){animation-delay:.18s;}
    .eq span:nth-child(3){animation-delay:.36s;}
    .eq span:nth-child(4){animation-delay:.12s;}
    .eq span:nth-child(5){animation-delay:.3s;}

    /* ---------- MOBILE MENU ---------- */
    .menu-toggle{
      display:none;position:absolute;top:clamp(16px,4%,28px);left:clamp(18px,4%,28px);z-index:7;
      width:44px;height:44px;align-items:center;justify-content:center;
      background:rgba(8,6,4,.5);border:1px solid rgba(205,164,95,.45);border-radius:2px;
      color:#e7ddcb;font-size:18px;cursor:pointer;backdrop-filter:blur(4px);
    }
    .mobile-menu{
      display:none;position:absolute;inset:0;z-index:6;
      flex-direction:column;align-items:center;justify-content:center;gap:26px;
      background:rgba(6,4,2,.94);backdrop-filter:blur(6px);
    }
    .mobile-menu.open{display:flex;}
    .mobile-menu a{
      font-family:'Marcellus',serif;font-size:22px;letter-spacing:.24em;text-transform:uppercase;
      color:#e7ddcb;text-decoration:none;transition:color .2s;
    }
    .mobile-menu a:hover,.mobile-menu a.active{color:#e9c17e;}

    @media (max-width:820px){
      .hero{aspect-ratio:auto;height:100svh;min-height:0;}
      .follow-label{display:none;}
      .social-row{top:20px;right:18px;}
      .menu-toggle{display:flex;}
      .nav-group{display:none;}
      .nav-bar{justify-content:center;width:100%;padding-bottom:clamp(24px,7%,40px);}
    }
  </style>
</head>
<body>

  <main class="hero">

    <!-- HERO ART PLATE -->
    <img class="hero-art" src="assets/hero-mock.png" alt="Dixon Hall — No Limit Country">

    <!-- masks to seat real UI on the baked art -->
    <div class="mask-social"></div>
    <div class="mask-nav"></div>

    <!-- FOLLOW US + SOCIALS -->
    <div class="social-row">
      <span class="follow-label">Follow Us</span>
      <div class="social-icons">
        <a href="https://www.facebook.com/dixonhallband" target="_blank" rel="noopener" aria-label="Facebook"><i class="fa-brands fa-facebook-f"></i></a>
        <a href="https://www.instagram.com/dixonhallband/" target="_blank" rel="noopener" aria-label="Instagram"><i class="fa-brands fa-instagram"></i></a>
        <a href="https://www.tiktok.com/@johndixonhalljr" target="_blank" rel="noopener" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
        <a href="#" aria-label="Spotify"><i class="fa-brands fa-spotify"></i></a>
      </div>
    </div>

    <!-- MOBILE MENU TOGGLE -->
    <button class="menu-toggle" id="menuToggle" aria-label="Menu" aria-expanded="false"><i class="fa-solid fa-bars"></i></button>

    <!-- BOTTOM NAV BAR -->
    <nav class="nav-bar">
      <div class="nav-group nav-left">
        <a class="nav-link active" href="#">Home</a>
        <a class="nav-link" href="#">Music</a>
        <a class="nav-link" href="#">About</a>
      </div>

      <a class="listen-btn" href="#">
        Listen Now
        <span class="eq"><span></span><span></span><span></span><span></span><span></span></span>
      </a>

      <div class="nav-group nav-right">
        <a class="nav-link" href="#">Shows</a>
        <a class="nav-link" href="#">Media</a>
        <a class="nav-link" href="#">Store</a>
      </div>
    </nav>

    <!-- MOBILE MENU OVERLAY -->
    <nav class="mobile-menu" id="mobileMenu">
      <a class="active" href="#">Home</a>
      <a href="#">Music</a>
      <a href="#">About</a>
      <a href="#">Shows</a>
      <a href="#">Media</a>
      <a href="#">Store</a>
    </nav>

  </main>

  <script>
    (function(){
      var toggle = document.getElementById('menuToggle');
      var menu = document.getElementById('mobileMenu');
      var icon = toggle.querySelector('i');
      toggle.addEventListener('click', function(){
        var open = menu.classList.toggle('open');
        toggle.setAttribute('aria-expanded', open);
        icon.className = open ? 'fa-solid fa-xmark' : 'fa-solid fa-bars';
      });
      menu.querySelectorAll('a').forEach(function(a){
        a.addEventListener('click', function(){
          menu.classList.remove('open');
          toggle.setAttribute('aria-expanded', false);
          icon.className = 'fa-solid fa-bars';
        });
      });
    })();
  </script>

</body>
</html>
